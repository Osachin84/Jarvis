        <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-JARVIS 2.0 ULTRA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { 
            background: #020208; color: #00ffcc; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            background-size: 100% 4px, 6px 100%; z-index: 10; pointer-events: none;
        }
        .header { 
            background: rgba(10, 10, 25, 0.9); padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; 
            border-bottom: 2px solid #00ffcc; box-shadow: 0 0 15px #00ffcc; letter-spacing: 2px; text-shadow: 0 0 8px #00ffcc;
        }
        .reactor-box { display: flex; justify-content: center; align-items: center; padding: 15px; background: rgba(5, 5, 15, 0.5); }
        .arc-reactor {
            width: 70px; height: 70px; border-radius: 50%; border: 4px double #00ffcc; box-shadow: 0 0 20px #00ffcc;
            animation: rotateReactor 4s linear infinite; position: relative;
        }
        .arc-reactor::after {
            content: ''; position: absolute; width: 30px; height: 30px; background: #00ffcc; border-radius: 50%; top: 16px; left: 16px;
            box-shadow: 0 0 15px #00ffcc; animation: pulseCore 1.5s ease-in-out infinite alternate;
        }
        @keyframes rotateReactor { 100% { transform: rotate(360deg); } }
        @keyframes pulseCore { 0% { opacity: 0.4; } 100% { opacity: 1; } }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #0a0a20 0%, #020208 100%); }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); }
        .user { background: rgba(0, 255, 204, 0.15); color: #00ffcc; align-self: flex-end; border: 1px solid #00ffcc; border-top-right-radius: 0px; }
        .ai { background: rgba(0, 153, 255, 0.1); color: #33b5ff; align-self: flex-start; border: 1px solid #33b5ff; border-top-left-radius: 0px; text-shadow: 0 0 2px rgba(51, 181, 255, 0.5); }
        .input-area { padding: 15px; background: #050510; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(0, 255, 204, 0.3); }
        input { flex: 1; padding: 14px; border: 1px solid #00ffcc; border-radius: 5px; background: #000; color: #00ffcc; outline: none; font-size: 1rem; box-shadow: inset 0 0 5px #00ffcc; }
        .btn { border: 1px solid #00ffcc; background: #000; color: #00ffcc; border-radius: 5px; width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.3s; box-shadow: 0 0 8px rgba(0,255,204,0.4); }
        .btn:active { transform: scale(0.9); box-shadow: 0 0 15px #00ffcc; }
        .mic-btn { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 8px rgba(255,0,85,0.4); }
        .mic-active { background: #ff0055 !important; color: #fff !important; animation: pulseCore 0.5s infinite alternate; }
    </style>
</head>
<body>

    <div class="header">⚡ S-JARVIS 2.0: SYSTEM ONLINE</div>
    <div class="reactor-box"><div class="arc-reactor" id="reactor"></div></div>
    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <button class="btn mic-btn" id="micBtn" onclick="startVoice()">🎤</button>
        <input type="text" id="userInput" placeholder="Ask Jarvis anything, Boss..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        var url = "https://text.pollinations.ai/";
        var system_prompt = "You are S-JARVIS, a highly advanced AI developed for Master Sachin Saini. Reply in friendly, short Hinglish.";

        // Safe Voice Output
        function jarvisSpeak(text) {
            try {
                if ('speechSynthesis' in window && window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    var cleanText = text.replace(/[*#_\[\]]/g, '');
                    var utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'hi-IN';
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) { console.log("Voice error ignored."); }
        }

        // Direct Welcome Message (No DOMContentLoaded dependency)
        try {
            var welcomeMsg = "Systems are fully operational. Welcome back, Master Sachin. How can I help you today, Boss?";
            appendMessage(welcomeMsg, 'ai');
            jarvisSpeak(welcomeMsg);
        } catch(e) { console.log(e); }

        // Bulletproof Voice Input
        function startVoice() {
            try {
                var SpeechClass = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SpeechClass) {
                    alert("Aapka phone app ke andar mic support nahi karta, kripya type karke baat karein Boss!");
                    return;
                }
                var recognition = new SpeechClass();
                recognition.lang = 'hi-IN';
                var micBtn = document.getElementById('micBtn');

                recognition.onstart = function() {
                    micBtn.className = 'btn mic-btn mic-active';
                    document.getElementById('userInput').placeholder = "Listening, Boss...";
                };
                recognition.onresult = function(event) {
                    document.getElementById('userInput').value = event.results[0][0].transcript;
                    sendMessage();
                };
                recognition.onerror = function() { stopMic(); };
                recognition.onend = function() { stopMic(); };
                recognition.start();
            } catch(e) { alert("Mic is blocked by phone settings."); }
        }

        function stopMic() {
            document.getElementById('micBtn').className = 'btn mic-btn';
            document.getElementById('userInput').placeholder = "Ask Jarvis anything, Boss...";
        }

        // Ultra Compatible Message Sender (Using standard XMLHttpRequest)
        function sendMessage() {
            try {
                var inputField = document.getElementById('userInput');
                var userText = inputField.value.trim();
                if (!userText) return;

                inputField.value = '';
                appendMessage(userText, 'user');

                // Local Commands
                var lowerText = userText.toLowerCase();
                if (lowerText.indexOf('time') !== -1 || lowerText.indexOf('samay') !== -1) {
                    respondLocal("Boss, current time is " + new Date().toLocaleTimeString());
                    return;
                }
                if (lowerText.indexOf('date') !== -1 || lowerText.indexOf('tarikh') !== -1) {
                    respondLocal("Today's date is " + new Date().toLocaleDateString());
                    return;
                }

                // Ultra Safe Network Request
                var xhr = new XMLHttpRequest();
                var apiLink = url + encodeURIComponent(userText) + "?system=" + encodeURIComponent(system_prompt);
                
                xhr.open("GET", apiLink, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            var replyText = xhr.responseText;
                            appendMessage(replyText, 'ai');
                            jarvisSpeak(replyText);
                        } else {
                            respondLocal("Mainframe connection issue. Status code: " + xhr.status);
                        }
                    }
                };
                xhr.send();

            } catch (e) {
                respondLocal("Network crash error, Boss.");
            }
        }

        function respondLocal(text) {
            appendMessage(text, 'ai');
            jarvisSpeak(text);
        }

        function appendMessage(text, sender) {
            var container = document.getElementById('chatContainer');
            var div = document.createElement('div');
            div.className = 'message ' + sender;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
