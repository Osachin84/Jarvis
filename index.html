<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>ChatGPT Style Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ==== BACKGROUND ==== */
body{
margin:0;
font-family: 'Roboto',Arial,Helvetica,sans-serif;
background: linear-gradient(135deg,#1f212d,#454a70);
color:#e1e1e1;
height:100vh;
display:flex;
flex-direction:column;
}
/* ==== HEADER ==== */
header{
padding:1rem;
text-align:center;
font-size:1.8rem;
background:linear-gradient(90deg,#ff8a00,#e52e71);
color:#fff;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
/* ==== CHAT AREA ==== */
.chat{
flex:1;
padding:1rem;
overflow-y:auto;
display:flex;
flex-direction:column;
}
.msg{
max-width:70%;
margin:.5rem 0;
padding:.8rem 1rem;
border-radius:16px;
line-height:1.45;
word-wrap:break-word;
}
.msg.user{align-self:flex-end;background:#0b93f6;color:#fff;}
.msg.bot{align-self:flex-start;background:#333;color:#fff;}
/* ==== INPUT BOX ==== */
.input-bar{
display:flex;
padding:.8rem;
border-top:1px solid #444;
background:#2c2f3e;
}
.input-bar input{
flex:1;
padding:.8rem;
border:none;
border-radius:25px;
background:#444;
color:#ddd;
font-size:1rem;
}
.input-bar button{
margin-left:.5rem;
padding:.8rem 1.2rem;
border:none;
border-radius:25px;
background:#ff8a00;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
.input-bar button:hover{background:#e52e71;}
/* scroll bar style */
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-track{background:#1a1c24;}
::-webkit-scrollbar-thumb{background:#444;border-radius:4px;}
</style>
</head>
<body>
<header>🗨️ ChatGPT Style Demo</header>

<div class="chat" id="chatBox"></div>

<div class="input-bar">
<input type="text" id="msgInput" placeholder="Type your message..." autocomplete="off">
<button id="sendBtn">Send</button>
</div>

<script>
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

function appendMessage(text, type='bot'){
const div = document.createElement('div');
div.className = `msg ${type}`;
div.textContent = text;
chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight; // auto-scroll
}

function getBotResponse(msg){
// Simple echo with delay (you can replace with your own AI API call)
return new Promise(r=>setTimeout(()=>r(`🤖 I've received: ${msg}`),1200));
}

async function sendMessage(){
const text = input.value.trim();
if(!text)return;
appendMessage(text,'user');
input.value="";
const botReply = await getBotResponse(text);
appendMessage(botReply,'bot');
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keypress', e=>{if(e.key==='Enter')sendMessage();});
</script>
</body>
</html>
