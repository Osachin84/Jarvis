<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis AI Portal</title>
    <style>
        /* --- Premium Cyberpunk & Glassmorphic Layout --- */
        body {
            margin: 0;
            padding: 10px;
            background: linear-gradient(135deg, #0b151a, #132229, #1a303a);
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 20px);
        }

        /* Top Bar Interface */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 10px;
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
            letter-spacing: 1px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 5px;
        }

        /* Sliding Gemini-Style Sidebar Drawer */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100%;
            background: #0d1b2a;
            border-right: 1px solid rgba(0, 255, 204, 0.2);
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            transition: 0.3s ease;
            z-index: 999;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .new-chat-sidebar-btn {
            background: rgba(0, 255, 204, 0.15);
            border: 1px dashed #00ffcc;
            color: #00ffcc;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .recents-section-title {
            font-size: 0.8rem;
            color: #8899a6;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .recents-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .recent-chat-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            font-size: 0.88rem;
            color: #e2e8f0;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }
        .recent-chat-item:hover, .recent-chat-item.active {
            background: rgba(0, 255, 204, 0.08);
            border-color: rgba(0, 255, 204, 0.3);
            color: #00ffcc;
        }

        .static-menu-list {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            font-size: 0.9rem;
            border: none;
            text-align: left;
            width: 100%;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 998;
        }

        /* Chat Workspace View */
        .chat-box-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 5px;
            margin-bottom: 10px;
        }

        .msg-bubble {
            max-width: 85%;
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.98rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-bubble.user {
            background: #004d40;
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .msg-bubble.jarvis {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            margin-right: auto;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ChatGPT Style Suggestion Grid Layer */
        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            padding: 5px;
        }

        .suggest-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            text-align: left;
        }
        .suggest-card:hover {
            background: rgba(0, 255, 204, 0.08);
            border-color: #00ffcc;
        }

        .suggest-card .title-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .suggest-card .sub-text {
            font-size: 0.72rem;
            color: #8899a6;
        }

        /* Input command controls */
        .input-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 8px 14px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 0.98rem;
            outline: none;
        }

        .action-icon-btn {
            background: none;
            border: none;
            color: #8899a6;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .action-icon-btn:hover {
            color: #00ffcc;
        }

        .send-action-btn {
            background: #00ffcc;
            border: none;
            color: #000;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <div class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">🤖 Jarvis Intelligence</div>
        
        <div class="new-chat-sidebar-btn" onclick="startBrandNewSession()">+ New Chat</div>
        
        <div class="recents-section-title">Recent Chats</div>
        
        <div class="recents-container" id="recentsLogContainer"></div>
        
        <div class="static-menu-list">
            <div class="menu-item" onclick="viewAccountProfile()">👤 User Account Profile</div>
            <div class="menu-item" onclick="openPrivacyPolicy()">🔒 Privacy Security Policy</div>
            <div class="menu-item" onclick="triggerLogout()" style="color: #ff4a4a;">🚪 Logout Account</div>
        </div>
    </div>

    <div class="container">
        <div class="top-navbar">
            <button class="menu-btn" onclick="toggleMenu(true)">☰</button>
            <div class="brand-title">JARVIS</div>
            <span id="liveTime" style="color: #ff9900; font-size: 0.85rem; font-weight: 600;">00:00:00 AM</span>
        </div>

        <div class="chat-box-area" id="chatWorkspace"></div>

        <div class="suggestion-grid" id="suggestionPanel">
            <div class="suggest-card" onclick="applySuggestion('🎨 Create an image', 'Design an advanced quantum AI core blueprint')">
                <div class="title-text">🎨 Create an image</div>
                <div class="sub-text">Design AI graphics</div>
            </div>
            <div class="suggest-card" onclick="applySuggestion('✍️ Write or edit', 'Draft a high-converting promotional pitch')">
                <div class="title-text">✍️ Write or edit</div>
                <div class="sub-text">Write essays or letters</div>
            </div>
        </div>

        <div class="input-bar-container">
            <button class="action-icon-btn" onclick="triggerCameraPhoto()" title="Open Camera / Photo">📷</button>
            <input type="text" id="userInputMsg" placeholder="Ask Jarvis anything..." class="chat-input" onkeypress="handleKeyPress(event)">
            <button class="send-action-btn" onclick="executeCommand()">➔</button>
        </div>
    </div>

    <script>
        let chatSessions = JSON.parse(localStorage.getItem('jarvis_vault_sessions')) || [];
        let activeSessionId = null;

        function toggleMenu(show) {
            document.getElementById('sidebarMenu').classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }

        function runClock() {
            const now = new Date();
            document.getElementById('liveTime').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(runClock, 1000);
        runClock();

        // Account & Security Utility Logic Links
        function viewAccountProfile() {
            alert("👤 Account Profile Details:\n\nUser ID: SACHIN SAINI\nTier Status: PRO\nActive Email: sachinsaini.pro@gmail.com");
        }

        function openPrivacyPolicy() {
            // Secure redirection method bypassing app target locks
            window.location.href = "https://osachin84.github.io/Jarvis/";
        }

        function triggerLogout() {
            if(confirm("🚪 Kya aap sach mein logout karke saari chat history mitalna chahte hain?")) {
                localStorage.removeItem('jarvis_vault_sessions');
                chatSessions = [];
                startBrandNewSession();
                alert("Logged out successfully.");
            }
        }

        function triggerCameraPhoto() {
            alert("📷 Camera Mode Interface Initializing...\n[Photo upload system active]");
        }

        // SMART MARKDOWN PARSER ENGINE
        function formatAIResponse(rawText) {
            if (!rawText) return "";
            let parsedText = rawText;
            parsedText = parsedText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            parsedText = parsedText.replace(/\n/g, '<br>');
            return parsedText;
        }

        function initAppSession() {
            startBrandNewSession();
            renderSidebarRecents();
        }

        function startBrandNewSession() {
            activeSessionId = 'session_' + Date.now();
            const workspace = document.getElementById('chatWorkspace');
            workspace.innerHTML = `<div class="msg-bubble jarvis">Hello Sachin! I am Jarvis. How can I assist you in this fresh session?</div>`;
            document.getElementById('suggestionPanel').style.display = 'grid';
            toggleMenu(false);
            renderSidebarRecents();
        }

        function renderSidebarRecents() {
            const listContainer = document.getElementById('recentsLogContainer');
            listContainer.innerHTML = '';
            const activeLogs = chatSessions.filter(s => s.chats && s.chats.length > 0);
            if (activeLogs.length === 0) {
                listContainer.innerHTML = `<div style="font-size:0.8rem; color:#556673; padding:5px;">No recent history logs.</div>`;
                return;
            }
            activeLogs.forEach(session => {
                const item = document.createElement('div');
                item.className = `recent-chat-item ${session.id === activeSessionId ? 'active' : ''}`;
                item.innerText = session.title || "Untitled Intelligence Log";
                item.onclick = () => loadHistoricalSession(session.id);
                listContainer.appendChild(item);
            });
        }

        function loadHistoricalSession(id) {
            const targetSession = chatSessions.find(s => s.id === id);
            if (!targetSession) return;
            activeSessionId = id;
            document.getElementById('suggestionPanel').style.display = 'none';
            const workspace = document.getElementById('chatWorkspace');
            workspace.innerHTML = '';
            targetSession.chats.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `msg-bubble ${msg.sender}`;
                bubble.innerHTML = msg.sender === 'jarvis' ? formatAIResponse(msg.text) : msg.text;
                workspace.appendChild(bubble);
            });
            workspace.scrollTop = workspace.scrollHeight;
            toggleMenu(false);
            renderSidebarRecents();
        }

        function applySuggestion(headline, text) {
            document.getElementById('userInputMsg').value = `${headline}: ${text}`;
            document.getElementById('suggestionPanel').style.display = 'none';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') executeCommand();
        }

        function executeCommand() {
            const field = document.getElementById('userInputMsg');
            const userText = field.value.trim();
            if (!userText) return;

            document.getElementById('suggestionPanel').style.display = 'none';
            const workspace = document.getElementById('chatWorkspace');
            const uBubble = document.createElement('div');
            uBubble.className = 'msg-bubble user';
            uBubble.innerHTML = userText;
            workspace.appendChild(uBubble);
            workspace.scrollTop = workspace.scrollHeight;

            field.value = '';

            let sessionIndex = chatSessions.findIndex(s => s.id === activeSessionId);
            if (sessionIndex === -1) {
                let generatedTitle = userText.length > 24 ? userText.substring(0, 22) + '...' : userText;
                chatSessions.unshift({ id: activeSessionId, title: generatedTitle, chats: [] });
                sessionIndex = 0;
            }

            chatSessions[sessionIndex].chats.push({ sender: 'user', text: userText });

            setTimeout(() => {
                let aiReply = "Analyzing request matrix parameters.";
                if (userText.toLowerCase().includes('time')) {
                    aiReply = `| Current system clock reads **${new Date().toLocaleTimeString()}** in your location zone layer setup.`;
                }

                const jBubble = document.createElement('div');
                jBubble.className = 'msg-bubble jarvis';
                jBubble.innerHTML = formatAIResponse(aiReply);
                workspace.appendChild(jBubble);
                workspace.scrollTop = workspace.scrollHeight;

                chatSessions[sessionIndex].chats.push({ sender: 'jarvis', text: aiReply });
                localStorage.setItem('jarvis_vault_sessions', JSON.stringify(chatSessions));
                renderSidebarRecents();
            }, 600);

            localStorage.setItem('jarvis_vault_sessions', JSON.stringify(chatSessions));
        }

        window.onload = initAppSession;
    </script>
</body>
</html>
